<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laundry Diagnostic Tool | 1Concier</title>
  <!-- Fonts: self-contained — system font stack (no external dependencies) -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 1Concier Brand Palette — matched to official logo */
      --primary: #162d4a;        /* Logo navy (exact match to CONCIER wordmark) */
      --primary-light: #1e3d62;  /* Slightly lighter navy */
      --primary-faint: #eef1f5;  /* Very light navy tint */
      --accent: #a07848;         /* Logo bronze (the "1" numeral color) */
      --accent-light: #b88d5c;   /* Lighter bronze for hovers */
      --accent-faint: #f7f0e8;   /* Very light bronze tint for selected states */
      --bg: #f4f1ee;             /* Warm off-white page background */
      --card: #ffffff;
      --border: #ddd8d2;         /* Warm-toned border */
      --text: #162d4a;           /* Same navy for headings */
      --text-body: #2c3a48;      /* Slightly lighter for body text */
      --muted: #7a7268;          /* Warm muted text */
      --high: #a63228;           /* Muted red (danger/high) */
      --high-bg: #fdf0ef;
      --med: #9a7020;            /* Warm amber */
      --med-bg: #fdf6e3;
      --low: #2e6e47;            /* Forest green */
      --low-bg: #edf7f2;
      --radius: 8px;
      --shadow: 0 2px 12px rgba(22,45,74,0.08);
      --shadow-hover: 0 6px 24px rgba(22,45,74,0.15);
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Announcement bar ── */
    .announcement-bar {
      background: var(--accent);
      color: #fff;
      text-align: center;
      padding: 8px 20px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    /* ── Header: two-tier (white logo bar + navy tool bar) ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e8e4de;
    }
    .header-logo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 40px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }
    .header-logo-bar a {
      display: block;
      line-height: 0;
    }
    .header-logo-bar img {
      height: 64px;
      width: auto;
      display: block;
    }
    .header-tool-bar {
      background: var(--primary);
      color: #fff;
    }
    .header-tool-bar-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 12px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .header-tool-bar-inner h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.01em;
    }
    .header-divider {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.3);
    }
    .header-tool-bar-inner p {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ── Progress bar ── */
    .progress-bar {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 36px;
    }
    .step-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      transition: color .25s;
    }
    .step-dot.active { color: var(--primary); }
    .step-dot.done { color: var(--accent); }
    .step-dot span.label { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
    .dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700;
      background: #fff;
      transition: all .25s;
      flex-shrink: 0;
    }
    .step-dot.active .dot {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .step-dot.done .dot {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }
    .step-line {
      flex: 1;
      height: 2px;
      background: var(--border);
      margin: 0 6px;
      transition: background .25s;
    }
    .step-line.done { background: var(--primary); }

    /* ── Section header ── */
    .section-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.45rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .section-sub {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 24px;
      font-weight: 400;
    }

    /* ── Product grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

    .sel-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 18px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
    }
    .sel-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .sel-card.selected {
      border-color: var(--accent);
      background: var(--accent-faint);
      box-shadow: 0 0 0 3px rgba(176,139,110,.15);
    }
    .sel-card .card-icon {
      font-size: 2.2rem;
      line-height: 1;
    }
    .sel-card .card-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }
    .sel-card .card-sub {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── Issue checkboxes ── */
    .issue-list { display: flex; flex-direction: column; gap: 10px; }
    .issue-item {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all .2s;
    }
    .issue-item:hover { border-color: var(--accent); box-shadow: var(--shadow); }
    .issue-item.selected {
      border-color: var(--accent);
      background: var(--accent-faint);
    }
    .issue-check {
      width: 20px; height: 20px; border-radius: 5px;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      transition: all .2s;
      background: #fff;
    }
    .issue-item.selected .issue-check {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .issue-icon { font-size: 1.4rem; flex-shrink: 0; }
    .issue-text .label { font-weight: 600; font-size: 0.9rem; }
    .issue-text .desc { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      justify-content: flex-end;
    }
    .btn {
      padding: 11px 28px;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 0.02em;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-light); box-shadow: 0 3px 12px rgba(176,139,110,.35); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Results ── */
    .results-header {
      background: var(--primary);
      color: #fff;
      padding: 24px 28px;
      border-radius: var(--radius);
      margin-bottom: 24px;
      border-left: 5px solid var(--accent);
    }
    .results-header h2 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .results-header p { font-size: 0.82rem; opacity: .8; }
    .results-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .tag {
      background: rgba(255,255,255,.15);
      color: #fff;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.76rem;
      font-weight: 500;
    }

    .issue-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .issue-section-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      background: #fff;
    }
    .issue-section-header:hover { background: var(--accent-faint); }
    .issue-section-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--primary);
      flex: 1;
    }
    .chevron {
      transition: transform .25s;
      color: var(--muted);
    }
    .chevron.open { transform: rotate(180deg); }

    .issue-section-body {
      padding: 0 20px 20px;
      display: none;
    }
    .issue-section-body.open { display: block; }

    .subsection-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 18px 0 10px;
    }

    /* Causes list */
    .cause-item {
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border-left: 4px solid transparent;
    }
    .cause-item.high { background: var(--high-bg); border-color: var(--high); }
    .cause-item.medium { background: var(--med-bg); border-color: var(--med); }
    .cause-item.low { background: var(--low-bg); border-color: var(--low); }
    .cause-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .cause-name { font-weight: 600; font-size: 0.875rem; flex: 1; }
    .likelihood-badge {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .high .likelihood-badge { background: var(--high); color: #fff; }
    .medium .likelihood-badge { background: var(--med); color: #fff; }
    .low .likelihood-badge { background: var(--low); color: #fff; }
    .cause-explanation { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }

    /* Action lists */
    .action-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .action-list li {
      display: flex;
      gap: 10px;
      font-size: 0.845rem;
      line-height: 1.5;
      color: var(--text);
      padding: 8px 12px;
      background: var(--bg);
      border-radius: 7px;
    }
    .action-list li::before {
      content: '→';
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── q-opt selected color ── */

    /* Legend */
    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .legend-dot.high { background: var(--high); }
    .legend-dot.medium { background: var(--med); }
    .legend-dot.low { background: var(--low); }

    .restart-row { display: flex; justify-content: center; margin-top: 32px; }

    /* ── 1Concier Care Standards Panel ── */
    .care-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .care-panel-header {
      background: var(--primary);
      color: #fff;
      padding: 14px 20px 12px;
      border-left: 5px solid var(--accent);
    }
    .care-panel-header h3 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .care-panel-header p {
      font-size: 0.7rem;
      opacity: 0.65;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .care-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .care-cell {
      padding: 14px 10px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .care-cell:last-child { border-right: none; }
    .care-cell-icon { margin-bottom: 6px; line-height: 0; }
    .care-cell-icon svg { width: 40px; height: 40px; display: block; margin: 0 auto; color: var(--primary); }
    .care-cell-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .care-cell-value {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.3;
    }
    .care-notes {
      padding: 12px 18px 14px;
      background: var(--accent-faint);
      border-top: 1px solid #e8ddd2;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .care-notes-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .care-note {
      font-size: 0.78rem;
      color: var(--text-body);
      display: flex;
      gap: 8px;
      line-height: 1.45;
    }
    .care-note-star {
      color: var(--accent);
      flex-shrink: 0;
      font-size: 0.7rem;
      margin-top: 2px;
    }
    @media (max-width: 540px) {
      .care-grid { grid-template-columns: repeat(3, 1fr); }
      .care-cell:nth-child(3) { border-right: none; }
      .care-cell:nth-child(4) { border-top: 1px solid var(--border); }
      .care-cell:nth-child(5) { border-top: 1px solid var(--border); border-right: none; }
    }

    /* ── Questionnaire ── */
    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .q-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .q-label .q-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent-faint);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .q-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .q-opt {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      color: var(--text);
      user-select: none;
    }
    .q-opt:hover { border-color: var(--accent); color: var(--accent); }
    .q-opt.selected { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* ── Adjusted badge ── */
    .adj-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 1px 7px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .adj-up { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
    .adj-down { background: #e2e8f0; color: #4a5568; border: 1px solid #a0aec0; }

    /* ── Answer summary strip ── */
    .answer-summary {
      background: var(--accent-faint);
      border: 1px solid #ddd0c3;
      border-radius: var(--radius);
      padding: 12px 18px;
      margin-bottom: 20px;
      font-size: 0.8rem;
      color: var(--primary);
      line-height: 1.7;
    }
    .answer-summary strong { color: var(--text); }

    /* ── Share / Export buttons ── */
    .share-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .btn-export {
      background: #fff;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .btn-export:hover { background: var(--accent-faint); }
    .btn-email {
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .btn-email:hover { background: var(--primary-light); }

    /* ── Site Footer ── */
    .site-footer {
      background: var(--primary);
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 24px 32px;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      margin-top: auto;
    }
    .site-footer .footer-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .site-footer .footer-logo img {
      height: 48px;
      width: auto;
      background: #fff;
      border-radius: 6px;
      padding: 6px 16px;
      display: block;
    }
    .site-footer p {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
    }

    /* ── Print / PDF styles ── */
    @media print {
      body { background: #fff; }
      .announcement-bar { display: none !important; }
      .header-logo-bar { background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .header-tool-bar { background: #162d4a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .progress-bar, .btn-row, .share-row, .restart-row, .site-footer { display: none !important; }
      main { padding: 16px 0; max-width: 100%; }
      .results-header { background: #162d4a !important; border-left-color: #a07848 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .issue-section-body { display: block !important; }
      .cause-item { break-inside: avoid; }
      .issue-section { break-inside: avoid; page-break-inside: avoid; }
      .answer-summary { border: 1px solid #ddd0c3; background: #f5ede4 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .cause-item.high { background: #fdf0ef !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .cause-item.medium { background: #fdf6e3 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .cause-item.low { background: #edf7f2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .print-footer { display: block !important; }
    }
    .print-footer {
      display: none;
      margin-top: 24px;
      font-size: 0.75rem;
      color: #7a6f65;
      text-align: center;
      border-top: 1px solid #ddd6cc;
      padding-top: 12px;
    }

    /* ── Responsive ── */
    @media (max-width: 540px) {
      .grid-2 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr 1fr; }
      .step-dot span.label { display: none; }
    }
  </style>
</head>
<body>

<div class="announcement-bar">
  Your Trusted Luxury Linen Provider &mdash; Hotels, Resorts, Healthcare &amp; Commercial Laundry
</div>

<header>

// ─────────────────────────────────────────────
//  ASTM D5489-25 CARE SYMBOLS (SVG)
//  Symbols follow the Commercial and Home Laundering
//  and Professional Textile Care Symbol standard.
//  Base shapes: wash=tub, bleach=triangle, dry=square,
//               iron=iron, dryClean=circle
//  Prohibitive "do not" = base symbol + red X overlay
// ─────────────────────────────────────────────
function getCareSymbolSVG(type, value) {
  const v = (value || '').toLowerCase();
  const isDoNot = v.startsWith('do not') || v.startsWith('do-not');

  // Red prohibitive X — per ASTM D5489-25 Fig. 4
  const prohibX =
    '<line x1="5" y1="5" x2="35" y2="35" stroke="#b03020" stroke-width="2.8" stroke-linecap="round"/>' +
    '<line x1="35" y1="5" x2="5" y2="35" stroke="#b03020" stroke-width="2.8" stroke-linecap="round"/>';

  const wrap = (body, addProhib) =>
    '<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" ' +
    'stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">' +
    body + (addProhib ? prohibX : '') + '</svg>';

  // ── WASH — open-top tub with wave; dots = temperature ──
  if (type === 'wash') {
    const tub =
      '<path d="M3,8 L37,8 L34,32 Q33,35 20,35 Q7,35 6,32 Z"/>' +
      '<path d="M9,21 Q14,17 20,21 Q26,25 31,21" stroke-width="1.7"/>';
    // Temperature dots at base of tub (per ASTM: 1=cold, 2=warm, 3=hot)
    const dots =
      v.includes('hot')  ? '<circle cx="14" cy="30" r="2.1" fill="currentColor" stroke="none"/>' +
                           '<circle cx="20" cy="30" r="2.1" fill="currentColor" stroke="none"/>' +
                           '<circle cx="26" cy="30" r="2.1" fill="currentColor" stroke="none"/>' :
      v.includes('warm') ? '<circle cx="17" cy="30" r="2.1" fill="currentColor" stroke="none"/>' +
                           '<circle cx="23" cy="30" r="2.1" fill="currentColor" stroke="none"/>' :
      v.includes('cold') ? '<circle cx="20" cy="30" r="2.1" fill="currentColor" stroke="none"/>' : '';
    return wrap(tub + dots, isDoNot);
  }

  // ── BLEACH — triangle; stripes = non-chlorine only ──
  if (type === 'bleach') {
    const tri = '<path d="M20,5 L36,34 L4,34 Z"/>';
    // Non-chlorine: three diagonal stripes inside triangle (per ASTM D5489-25 Fig. 1)
    const stripes = v.includes('non')
      ? '<line x1="11" y1="32" x2="17" y2="19" stroke-width="1.6"/>' +
        '<line x1="17" y1="32" x2="23" y2="19" stroke-width="1.6"/>' +
        '<line x1="23" y1="32" x2="29" y2="19" stroke-width="1.6"/>'
      : '';
    return wrap(tri + stripes, isDoNot);
  }

  // ── DRY — square outer; inner symbol varies by method ──
  if (type === 'dry') {
    const sq = '<rect x="4" y="4" width="32" height="32" rx="2"/>';

    // Air/line dry — three vertical lines (hanging) per ASTM Fig. 1
    if (v.includes('air') || v.includes('hang') || v.includes('line dry')) {
      const lines =
        '<line x1="13" y1="8" x2="13" y2="36" stroke-width="1.8"/>' +
        '<line x1="20" y1="8" x2="20" y2="36" stroke-width="1.8"/>' +
        '<line x1="27" y1="8" x2="27" y2="36" stroke-width="1.8"/>';
      return wrap(sq + lines, false);
    }

    // Dry flat — single horizontal line per ASTM Fig. 1
    if (v.includes('flat')) {
      return wrap(sq + '<line x1="8" y1="20" x2="32" y2="20" stroke-width="1.8"/>', false);
    }

    // Tumble dry — circle inside square; dots = heat level
    // 1 dot = low, 2 dots = medium, 3 dots = high, filled circle = no heat/air
    const circle = '<circle cx="20" cy="20" r="11" stroke-width="1.8"/>';
    const dots =
      (v.includes('low') && (v.includes('med') || v.includes('medium')))
        ? '<circle cx="16" cy="20" r="2.1" fill="currentColor" stroke="none"/>' +
          '<circle cx="24" cy="20" r="2.1" fill="currentColor" stroke="none"/>'
        : v.includes('low')
        ? '<circle cx="20" cy="20" r="2.1" fill="currentColor" stroke="none"/>'
        : v.includes('high')
        ? '<circle cx="13" cy="20" r="2.1" fill="currentColor" stroke="none"/>' +
          '<circle cx="20" cy="20" r="2.1" fill="currentColor" stroke="none"/>' +
          '<circle cx="27" cy="20" r="2.1" fill="currentColor" stroke="none"/>'
        : '';
    return wrap(sq + circle + dots, isDoNot);
  }

  // ── IRON — profile silhouette; dots = heat level ──
  if (type === 'iron') {
    // Body: wide sole plate tapering to a point at the right (front of iron)
    // Handle: arch over the back half of the body
    const iron =
      '<path d="M3,29 L3,19 Q3,14 9,14 L26,14 Q36,14 38,21 L38,26 Q38,30 34,30 L3,30 Z"/>' +
      '<path d="M10,14 Q10,7 18,7 Q26,7 26,14"/>';
    // Heat dots on sole plate (per ASTM: 1=low 110°C, 2=med 150°C, 3=high 200°C)
    const dots =
      v.includes('high') ? '<circle cx="13" cy="24" r="1.8" fill="white" stroke="none"/>' +
                           '<circle cx="20" cy="24" r="1.8" fill="white" stroke="none"/>' +
                           '<circle cx="27" cy="24" r="1.8" fill="white" stroke="none"/>' :
      v.includes('med')  ? '<circle cx="16" cy="24" r="1.8" fill="white" stroke="none"/>' +
                           '<circle cx="24" cy="24" r="1.8" fill="white" stroke="none"/>' :
      v.includes('low')  ? '<circle cx="20" cy="24" r="1.8" fill="white" stroke="none"/>' : '';
    return wrap(iron + dots, isDoNot);
  }

  // ── DRY CLEAN — circle; letters indicate solvent ──
  if (type === 'dryClean') {
    return wrap('<circle cx="20" cy="20" r="15"/>', isDoNot);
  }

  return '';
}

function buildCarePanel(product, fiber) {
  const std = careStandards[product]?.[fiber];
  if (!std) return null;

  const panel = document.createElement('div');
  panel.className = 'care-panel';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'care-panel-header';
  hdr.innerHTML = '<h3>1Concier Recommended Care Standards</h3>' +
    '<p>' + (products.find(p => p.id === product)?.label || '') + ' &nbsp;·&nbsp; ' +
    (fibers.find(f => f.id === fiber)?.label || '') + ' &nbsp;·&nbsp; Symbols per ASTM D5489-25</p>';
  panel.appendChild(hdr);

  // Care grid
  const grid = document.createElement('div');
  grid.className = 'care-grid';

  const cells = [
    { type: 'wash',     label: 'Wash',      value: std.wash.value },
    { type: 'bleach',   label: 'Bleach',    value: std.bleach.value },
    { type: 'dry',      label: 'Dry',       value: std.dry.value },
    { type: 'iron',     label: 'Iron',      value: std.iron.value },
    { type: 'dryClean', label: 'Dry Clean', value: std.dryClean.value }
  ];

  cells.forEach(c => {
    const cell = document.createElement('div');
    cell.className = 'care-cell';
    cell.innerHTML =
      '<div class="care-cell-icon">' + getCareSymbolSVG(c.type, c.value) + '</div>' +
      '<div class="care-cell-label">' + c.label + '</div>' +
      '<div class="care-cell-value">' + c.value + '</div>';
    grid.appendChild(cell);
  });
  panel.appendChild(grid);

  // Notes
  const notes = [std.wash.note, std.dry.note, std.iron.note, std.bleach.note, std.dryClean.note].filter(Boolean);
  if (notes.length > 0) {
    const notesDiv = document.createElement('div');
    notesDiv.className = 'care-notes';
    const notesLbl = document.createElement('div');
    notesLbl.className = 'care-notes-label';
    notesLbl.textContent = '1Concier Care Notes';
    notesDiv.appendChild(notesLbl);
    notes.forEach(note => {
      const row = document.createElement('div');
      row.className = 'care-note';
      row.innerHTML = '<span class="care-note-star">★</span><span>' + note + '</span>';
      notesDiv.appendChild(row);
    });
    panel.appendChild(notesDiv);
  }

  return panel;
}

// ─────────────────────────────────────────────
//  RENDER ENGINE
// ─────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  app.appendChild(buildProgress());

  if (state.step === 1) app.appendChild(buildStep1());
  else if (state.step === 2) app.appendChild(buildStep2());
  else if (state.step === 3) app.appendChild(buildStep3());
  else if (state.step === 4) app.appendChild(buildStep4());
  else if (state.step === 5) app.appendChild(buildResults());
}

function buildProgress() {
  const steps = [
    { n: 1, label: 'Product Type' },
    { n: 2, label: 'Fiber Content' },
    { n: 3, label: 'Issues' },
    { n: 4, label: 'Laundry Process' },
    { n: 5, label: 'Diagnosis' }
  ];
  const bar = document.createElement('div');
  bar.className = 'progress-bar';

  steps.forEach((s, i) => {
    const dot = document.createElement('div');
    let cls = 'step-dot';
    if (s.n === state.step) cls += ' active';
    else if (s.n < state.step) cls += ' done';
    dot.className = cls;

    const d = document.createElement('div');
    d.className = 'dot';
    d.textContent = s.n < state.step ? '✓' : s.n;
    dot.appendChild(d);

    const lbl = document.createElement('span');
    lbl.className = 'label';
    lbl.textContent = s.label;
    dot.appendChild(lbl);
    bar.appendChild(dot);

    if (i < steps.length - 1) {
      const line = document.createElement('div');
      line.className = s.n < state.step ? 'step-line done' : 'step-line';
      bar.appendChild(line);
    }
  });
  return bar;
}

function buildStep1() {
  const wrap = document.createElement('div');

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = 'What type of product is affected?';
  const sub = document.createElement('div');
  sub.className = 'section-sub';
  sub.textContent = 'Select the category of linen or textile experiencing issues.';
  wrap.appendChild(title);
  wrap.appendChild(sub);

  const grid = document.createElement('div');
  grid.className = 'grid-2';

  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'sel-card' + (state.product === p.id ? ' selected' : '');

    const icon = document.createElement('div');
    icon.className = 'card-icon';
    icon.textContent = p.icon;

    const lbl = document.createElement('div');
    lbl.className = 'card-label';
    lbl.textContent = p.label;

    const s = document.createElement('div');
    s.className = 'card-sub';
    s.textContent = p.sub;

    card.appendChild(icon);
    card.appendChild(lbl);
    card.appendChild(s);
    card.addEventListener('click', () => {
      state.product = p.id;
      render();
    });
    grid.appendChild(card);
  });
  wrap.appendChild(grid);

  const row = document.createElement('div');
  row.className = 'btn-row';
  const next = document.createElement('button');
  next.className = 'btn btn-primary';
  next.textContent = 'Next →';
  next.disabled = !state.product;
  next.addEventListener('click', () => { if (state.product) { state.step = 2; render(); window.scrollTo(0,0); } });
  row.appendChild(next);
  wrap.appendChild(row);

  return wrap;
}

// ─────────────────────────────────────────────
//  SCORING ENGINE — MODIFIER LOGIC
// ─────────────────────────────────────────────
function boost(level) {
  if (level === 'Low')    return 'Medium';
  if (level === 'Medium') return 'High';
  return 'High';
}
function demote(level) {
  if (level === 'High')   return 'Medium';
  if (level === 'Medium') return 'Low';
  return 'Low';
}

function applyModifiers(causes, answers) {
  return causes.map(c => {
    let level = c.likelihood;
    const text = (c.cause + ' ' + c.explanation).toLowerCase();

    // ── Bleach type ──
    if (answers.bleach === 'chlorine') {
      // User confirmed chlorine bleach → chlorine-related causes are more likely
      if (text.includes('chlorine')) level = boost(level);
    } else if (answers.bleach === 'oxygen') {
      // Oxygen bleach only → chlorine causes drop in likelihood
      if (text.includes('chlorine bleach') || (text.includes('chlorine') && !text.includes('oxygen')))
        level = demote(level);
    } else if (answers.bleach === 'none') {
      // No bleach at all → any bleach cause is very unlikely
      if (text.includes('bleach') && !text.includes('no bleach') && !text.includes('without bleach'))
        level = demote(demote(level));
    }

    // ── Water hardness ──
    const hasMineralKeyword = text.includes('mineral') || text.includes('iron') ||
      text.includes('hard water') || text.includes('calcium') || text.includes('magnesium') ||
      text.includes('deposit');
    if (hasMineralKeyword) {
      if (answers.waterHardness === 'hard' && answers.softener !== 'yes') {
        level = boost(level);
      } else if (answers.waterHardness === 'soft' || answers.softener === 'yes') {
        level = demote(level);
      }
    }

    // ── Dryer temperature ──
    const hasThermalKeyword = text.includes('dryer temperature') || text.includes('dryer temp') ||
      text.includes('thermal') || text.includes('heat') || text.includes('excessive') ||
      (text.includes('dryer') && (text.includes('above') || text.includes('exceed') || text.includes('high')));
    if (hasThermalKeyword) {
      if (answers.dryerTemp === 'high') level = boost(level);
      else if (answers.dryerTemp === 'low') level = demote(level);
    }

    // ── Dryer cycle type (over-drying) ──
    const hasOverdryKeyword = text.includes('over-dry') || text.includes('over dry') ||
      text.includes('timed cycle') || text.includes('timed dry');
    if (hasOverdryKeyword) {
      if (answers.dryerCycle === 'timed')   level = boost(level);
      else if (answers.dryerCycle === 'sensing') level = demote(level);
    }

    // ── Fabric softener ──
    const hasSoftenerKeyword = text.includes('softener') || text.includes('cationic') ||
      text.includes('conditioner');
    if (hasSoftenerKeyword) {
      if (answers.fabricSoftener === 'yes') level = boost(level);
      else if (answers.fabricSoftener === 'no') level = demote(level);
    }

    // ── Optical brighteners / OBAs ──
    const hasOBAKeyword = text.includes('brightener') || text.includes('oba') ||
      text.includes('optical') || text.includes('bluing');
    if (hasOBAKeyword) {
      // Depletion cause: if using OBAs, less likely to be depleted; if not using, more likely
      if (answers.brighteners === 'yes') level = demote(level);
      else if (answers.brighteners === 'no') level = boost(level);
    }

    // ── Wash temperature (protein/soil removal) ──
    const hasProteinKeyword = text.includes('protein') || text.includes('body oil') ||
      text.includes('lotion') || text.includes('sunscreen') ||
      (text.includes('soil') && text.includes('residue'));
    if (hasProteinKeyword) {
      // Low wash temp → protein soils not fully removed → boost these causes
      if (answers.washTemp === 'low') level = boost(level);
      else if (answers.washTemp === 'high') level = demote(level);
    }

    // ── Iron / press temperature ──
    const hasIronKeyword = text.includes('press') || text.includes('ironer') ||
      text.includes('iron temperature') || text.includes('press temperature') ||
      text.includes('pressing') || text.includes('press heat');
    if (hasIronKeyword) {
      if (answers.ironTemp === 'hot') {
        // Cotton/linen setting on synthetic fabric → very likely cause of damage
        level = boost(level);
      } else if (answers.ironTemp === 'warm') {
        // Synthetic setting is borderline for polyester — slight boost if cause mentions poly press damage
        if (text.includes('polyester') || text.includes('poly') || text.includes('synthetic')) {
          level = boost(level);
        }
      } else if (answers.ironTemp === 'cool') {
        level = demote(level);
      } else if (answers.ironTemp === 'none') {
        // Items aren't ironed at all — press-related causes are not applicable
        level = demote(demote(level));
      }
    }

    // ── Laundry cycle count ──
    // Cumulative / wear-related causes are more likely on heavily laundered articles;
    // first-wash issues (manufacturing defects, initial chemical exposure) are
    // disproportionately likely when the article is brand new.
    const hasCumulativeKeyword = text.includes('cumulative') || text.includes('repeated') ||
      text.includes('over time') || text.includes('each cycle') || text.includes('repeated cycle') ||
      text.includes('end-of-life') || text.includes('service life') || text.includes('lifespan') ||
      text.includes('aging') || text.includes('age') || text.includes('finite') ||
      text.includes('progressive') || text.includes('wears') || text.includes('repeated wash');
    const hasFirstWashKeyword = text.includes('manufactur') || text.includes('initial') ||
      text.includes('first wash') || text.includes('new item') || text.includes('factory') ||
      text.includes('production defect') || text.includes('sizing') || text.includes('residual dye');
    if (answers.washCount === 'first') {
      // Brand new — cumulative causes very unlikely; first-wash/manufacturing causes more likely
      if (hasCumulativeKeyword) level = demote(demote(level));
      if (hasFirstWashKeyword) level = boost(level);
    } else if (answers.washCount === '2-10') {
      if (hasCumulativeKeyword) level = demote(level);
    } else if (answers.washCount === '25-50') {
      if (hasCumulativeKeyword) level = boost(level);
      if (hasFirstWashKeyword) level = demote(level);
    } else if (answers.washCount === '50plus') {
      // Heavily laundered — cumulative damage is the primary suspect
      if (hasCumulativeKeyword) level = boost(boost(level));
      if (hasFirstWashKeyword) level = demote(demote(level));
    }

    // ── Mixed vs. like-item loads ──
    // Mixed loads with abrasive items raise likelihood of pilling, snagging, and fraying causes
    // related to foreign items, velcro, or hardware.
    const hasMixedKeyword = text.includes('velcro') || text.includes('mixed') ||
      text.includes('abrasive item') || text.includes('co-wash') || text.includes('hardware') ||
      text.includes('mixed load') || text.includes('rough item') || text.includes('mixed into');
    if (hasMixedKeyword) {
      if (answers.mixedLoad === 'mixed') level = boost(level);
      else if (answers.mixedLoad === 'like') level = demote(level);
    }

    // ── Equipment service history ──
    // Overdue or absent maintenance raises likelihood of equipment-related causes
    // (drum burrs, rough surfaces, worn baffles).
    const hasEquipKeyword = text.includes('drum') || text.includes('washer drum') ||
      text.includes('equipment') || text.includes('machine') || text.includes('worn') ||
      text.includes('rough spot') || text.includes('broken weld') || text.includes('baffle') ||
      text.includes('in poor repair') || text.includes('damaged washer');
    if (hasEquipKeyword) {
      if (answers.equipService === 'overdue' || answers.equipService === 'unknown') level = boost(level);
      else if (answers.equipService === 'recent') level = demote(level);
    }

    const adjusted = level !== c.likelihood;
    const direction = adjusted ? (
      ['High','Medium','Low'].indexOf(level) < ['High','Medium','Low'].indexOf(c.likelihood) ? 'up' : 'down'
    ) : null;

    return { ...c, likelihood: level, adjusted, direction };
  }).sort((a, b) => {
    const order = { High: 0, Medium: 1, Low: 2 };
    return order[a.likelihood] - order[b.likelihood];
  });
}

function buildAnswerSummary() {
  const a = state.answers;
  const parts = [];
  const bleachMap = { chlorine: 'Chlorine bleach', oxygen: 'Oxygen bleach', none: 'No bleach' };
  const tempMap   = { low: 'low (<130°F)', medium: 'medium (130–160°F)', high: 'high (>160°F)' };
  const hardMap   = { soft: 'soft', moderate: 'moderate', hard: 'hard' };

  if (a.bleach && a.bleach !== 'unknown')
    parts.push('Bleach: <strong>' + bleachMap[a.bleach] + '</strong>');
  if (a.washTemp && a.washTemp !== 'unknown')
    parts.push('Wash temp: <strong>' + tempMap[a.washTemp] + '</strong>');
  if (a.dryerTemp && a.dryerTemp !== 'unknown')
    parts.push('Dryer temp: <strong>' + tempMap[a.dryerTemp] + '</strong>');
  if (a.dryerCycle && a.dryerCycle !== 'unknown')
    parts.push('Dryer cycle: <strong>' + (a.dryerCycle === 'timed' ? 'Timed' : 'Moisture-sensing') + '</strong>');
  if (a.waterHardness && a.waterHardness !== 'unknown')
    parts.push('Water: <strong>' + hardMap[a.waterHardness] + '</strong>');
  if (a.softener === 'yes')
    parts.push('Water softener: <strong>Yes</strong>');
  if (a.softener === 'no')
    parts.push('Water softener: <strong>No</strong>');
  if (a.fabricSoftener && a.fabricSoftener !== 'unknown')
    parts.push('Fabric softener: <strong>' + (a.fabricSoftener === 'yes' ? 'Yes' : 'No') + '</strong>');
  if (a.brighteners && a.brighteners !== 'unknown')
    parts.push('OBAs/brighteners: <strong>' + (a.brighteners === 'yes' ? 'Yes' : 'No') + '</strong>');
  const ironMap = { hot: 'hot (cotton setting)', warm: 'warm (synthetic setting)', cool: 'cool (low setting)', none: 'not ironed' };
  if (a.ironTemp && a.ironTemp !== 'unknown')
    parts.push('Iron/press temp: <strong>' + ironMap[a.ironTemp] + '</strong>');

  const washCountMap = { first: 'First wash', '2-10': '2–10 washes', '10-25': '10–25 washes', '25-50': '25–50 washes', '50plus': '50+ washes' };
  if (a.washCount)
    parts.push('Wash count: <strong>' + washCountMap[a.washCount] + '</strong>');

  const mixedLoadMap = { like: 'Like items only', mixed: 'Mixed loads' };
  if (a.mixedLoad && a.mixedLoad !== 'unknown')
    parts.push('Load composition: <strong>' + mixedLoadMap[a.mixedLoad] + '</strong>');

  const equipServiceMap = { recent: 'Serviced within 6 months', overdue: 'Overdue / unknown', unknown: 'No service program' };
  if (a.equipService)
    parts.push('Equipment service: <strong>' + equipServiceMap[a.equipService] + '</strong>');

  return parts;

function buildMailtoLink() {
  const a = state.answers;
  const productLabel  = products.find(p => p.id === state.product)?.label  || state.product;
  const fiberLabel    = fibers.find(f => f.id === state.fiber)?.label      || state.fiber;
  const issueList     = state.issues.map(i => issueLabels[i]).join(', ');
  const dateStr       = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

  const bleachMap   = { chlorine:'Chlorine bleach', oxygen:'Oxygen / non-chlorine bleach', none:'No bleach', unknown:'Not specified' };
  const tempMap     = { low:'Low (<130°F)', medium:'Medium (130–160°F)', high:'High (>160°F)', unknown:'Not specified' };
  const cycleMap    = { sensing:'Moisture-sensing (auto-dry)', timed:'Timed cycle', unknown:'Not specified' };
  const hardMap     = { soft:'Soft (<100 ppm)', moderate:'Moderate (100–200 ppm)', hard:'Hard (>200 ppm)', unknown:'Not specified' };
  const yesNoMap    = { yes:'Yes', no:'No', unknown:'Not specified' };

  // Collect top causes per issue (High likelihood after modifiers)
  let causeSummary = '';
  state.issues.forEach(issueId => {
    const data = db[issueId]?.[state.product]?.[state.fiber];
    if (!data) return;
    const scored = applyModifiers(data.causes, a);
    const topCauses = scored.filter(c => c.likelihood === 'High').map(c => '  - ' + c.cause);
    if (topCauses.length > 0) {
      causeSummary += '\n' + issueLabels[issueId].toUpperCase() + ' — High-likelihood causes:\n' + topCauses.join('\n');
    }
  });

  const subject = encodeURIComponent(
    'Laundry Issue Report — ' + productLabel + ' (' + fiberLabel + ')'
  );

  const body = encodeURIComponent(
    'LAUNDRY QUALITY DIAGNOSTIC REPORT\n' +
    'Generated: ' + dateStr + '\n' +
    '────────────────────────────────────\n\n' +
    'ITEM DETAILS\n' +
    'Product Type:     ' + productLabel + '\n' +
    'Fiber Content:    ' + fiberLabel + '\n' +
    'Issues Observed:  ' + issueList + '\n\n' +
    'LAUNDRY PROCESS\n' +
    'Bleach type:           ' + (bleachMap[a.bleach]        || 'Not answered') + '\n' +
    'Wash temperature:      ' + (tempMap[a.washTemp]         || 'Not answered') + '\n' +
    'Dryer temperature:     ' + (tempMap[a.dryerTemp]        || 'Not answered') + '\n' +
    'Dryer cycle type:      ' + (cycleMap[a.dryerCycle]      || 'Not answered') + '\n' +
    'Water hardness:        ' + (hardMap[a.waterHardness]    || 'Not answered') + '\n' +
    'Water softener in use: ' + (yesNoMap[a.softener]        || 'Not answered') + '\n' +
    'Fabric softener:       ' + (yesNoMap[a.fabricSoftener]  || 'Not answered') + '\n' +
    'Brighteners / OBAs:    ' + (yesNoMap[a.brighteners]     || 'Not answered') + '\n' +
    'Iron/press temperature: ' + ({'hot':'Hot — cotton/linen setting (above 300°F)','warm':'Warm — synthetic setting (230–300°F)','cool':'Cool — low setting (below 230°F)','none':'Not ironed / pressed'}[a.ironTemp] || 'Not answered') + '\n' +
    'Times laundered:       ' + ({'first':'First wash (brand new)','2-10':'2–10 washes','10-25':'10–25 washes','25-50':'25–50 washes','50plus':'More than 50 washes'}[a.washCount] || 'Not answered') + '\n\n' +
    'DIAGNOSTIC RESULTS — TOP CAUSES' +
    (causeSummary || '\n  (No high-likelihood causes identified with current inputs)') + '\n\n' +
    '────────────────────────────────────\n' +
    'Please attach any supporting photos, lab reports, or product samples.\n\n' +
    'This report was generated using the Laundry Quality Diagnostic Tool.\n'
  );

  return 'mailto:1CQuality@1Concier.com?subject=' + subject + '&body=' + body;
}

  const wrap = document.createElement('div');

  const productLabel = products.find(p => p.id === state.product)?.label || '';
  const fiberLabel = fibers.find(f => f.id === state.fiber)?.label || '';

  // Answer summary strip
  const summaryParts = buildAnswerSummary();
  if (summaryParts.length > 0) {
    const strip = document.createElement('div');
    strip.className = 'answer-summary';
    strip.innerHTML = '🔧 <strong>Your laundry process:</strong> ' + summaryParts.join(' &nbsp;·&nbsp; ') +
      ' <span style="margin-left:8px;font-size:0.75rem;opacity:.7;">— causes ranked accordingly</span>';
    wrap.appendChild(strip);
  }

  // Header card
  const header = document.createElement('div');
  header.className = 'results-header';

  const h2 = document.createElement('h2');
  h2.textContent = 'Root Cause Diagnosis';
  const p = document.createElement('p');
  p.textContent = summaryParts.length > 0
    ? 'Cause likelihoods have been adjusted based on your laundry process answers.'
    : 'Based on your selections, here are the most likely causes and recommended actions.';
  const tags = document.createElement('div');
  tags.className = 'results-tags';

  [productLabel, fiberLabel, ...state.issues.map(i => issueLabels[i])].forEach(label => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = label;
    tags.appendChild(tag);
  });

  header.appendChild(h2);
  header.appendChild(p);
  header.appendChild(tags);
  wrap.appendChild(header);

  // 1Concier Care Standards Panel
  const carePanel = buildCarePanel(state.product, state.fiber);
  if (carePanel) wrap.appendChild(carePanel);

  // Legend
  const legend = document.createElement('div');
  legend.className = 'legend';
  [['high','High likelihood'],['medium','Medium likelihood'],['low','Lower likelihood']].forEach(([cls, lbl]) => {
    const li = document.createElement('div');
    li.className = 'legend-item';
    const dot = document.createElement('div');
    dot.className = `legend-dot ${cls}`;
    const span = document.createElement('span');
    span.textContent = lbl;
    li.appendChild(dot);
    li.appendChild(span);
    legend.appendChild(li);
  });
  wrap.appendChild(legend);

  // Issue sections
  state.issues.forEach((issueId, idx) => {
    const data = db[issueId]?.[state.product]?.[state.fiber];
    if (!data) return;

    const section = document.createElement('div');
    section.className = 'issue-section';

    const hdr = document.createElement('div');
    hdr.className = 'issue-section-header';

    const icon = document.createElement('span');
    icon.textContent = issueIcons[issueId] + ' ';
    icon.style.fontSize = '1.2rem';

    const title = document.createElement('div');
    title.className = 'issue-section-title';
    title.textContent = issueLabels[issueId];

    const chev = document.createElement('span');
    chev.className = 'chevron open';
    chev.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 7l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    hdr.appendChild(icon);
    hdr.appendChild(title);
    hdr.appendChild(chev);

    const body = document.createElement('div');
    body.className = 'issue-section-body open';

    // Causes — apply modifiers if questionnaire was answered
    const causesLbl = document.createElement('div');
    causesLbl.className = 'subsection-label';
    causesLbl.textContent = '🔍 Most Likely Causes';
    body.appendChild(causesLbl);

    const scoredCauses = applyModifiers(data.causes, state.answers);
    const anyAdjusted = scoredCauses.some(c => c.adjusted);

    if (anyAdjusted) {
      const adjNote = document.createElement('div');
      adjNote.style.cssText = 'font-size:0.75rem;color:var(--muted);margin-bottom:10px;';
      adjNote.innerHTML = 'Rankings adjusted based on your answers. ' +
        '<span class="adj-badge adj-up">↑ raised</span> or ' +
        '<span class="adj-badge adj-down">↓ lowered</span> from the baseline.';
      body.appendChild(adjNote);
    }

    scoredCauses.forEach(c => {
      const item = document.createElement('div');
      const likClass = c.likelihood.toLowerCase();
      item.className = `cause-item ${likClass}`;

      const top = document.createElement('div');
      top.className = 'cause-top';

      const name = document.createElement('div');
      name.className = 'cause-name';
      name.textContent = c.cause;
      if (c.adjusted) {
        const adjBadge = document.createElement('span');
        adjBadge.className = 'adj-badge ' + (c.direction === 'up' ? 'adj-up' : 'adj-down');
        adjBadge.textContent = c.direction === 'up' ? '↑ raised' : '↓ lowered';
        name.appendChild(adjBadge);
      }

      const badge = document.createElement('span');
      badge.className = 'likelihood-badge';
      badge.textContent = c.likelihood;

      top.appendChild(name);
      top.appendChild(badge);

      const exp = document.createElement('div');
      exp.className = 'cause-explanation';
      exp.textContent = c.explanation;

      item.appendChild(top);
      item.appendChild(exp);
      body.appendChild(item);
    });

    // Diagnostics
    const diagLbl = document.createElement('div');
    diagLbl.className = 'subsection-label';
    diagLbl.textContent = '🧪 How to Confirm the Problem';
    body.appendChild(diagLbl);

    const diagList = document.createElement('ul');
    diagList.className = 'action-list';
    data.diagnostics.forEach(d => {
      const li = document.createElement('li');
      li.textContent = d;
      diagList.appendChild(li);
    });
    body.appendChild(diagList);

    // Prevention
    const prevLbl = document.createElement('div');
    prevLbl.className = 'subsection-label';
    prevLbl.textContent = '✅ Prevention & Corrective Actions';
    body.appendChild(prevLbl);

    const prevList = document.createElement('ul');
    prevList.className = 'action-list';
    data.prevention.forEach(pr => {
      const li = document.createElement('li');
      li.textContent = pr;
      prevList.appendChild(li);
    });
    body.appendChild(prevList);

    // Toggle behavior
    hdr.addEventListener('click', () => {
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      chev.classList.toggle('open', !isOpen);
    });

    section.appendChild(hdr);
    section.appendChild(body);
    wrap.appendChild(section);
  });

  // Disclaimer
  const disc = document.createElement('div');
  disc.style.cssText = 'background:#f0f4f8;border-radius:8px;padding:14px 18px;font-size:0.78rem;color:#718096;margin-top:18px;line-height:1.6;';
  disc.innerHTML = '💡 <strong>Note:</strong> Multiple causes may contribute simultaneously. Begin with the highest-likelihood items first and confirm each through the suggested diagnostic steps before making process changes. Care settings shown above reflect 1Concier\'s recommended standards as defined in the Care Instructions Quality Review (April 2026).';
  wrap.appendChild(disc);

  // Print footer (hidden on screen, visible in print/PDF)
  const printFooter = document.createElement('div');
  printFooter.className = 'print-footer';
  printFooter.innerHTML = 'Laundry Diagnostic Tool &nbsp;·&nbsp; Generated ' +
    new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) +
    ' &nbsp;·&nbsp; For support contact <strong>1CQuality@1Concier.com</strong>';
  wrap.appendChild(printFooter);

  // Export / Share row
  const shareRow = document.createElement('div');
  shareRow.className = 'share-row';

  // ── Export PDF button ──
  const pdfBtn = document.createElement('button');
  pdfBtn.className = 'btn btn-export';
  pdfBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 2h7l3 3v9a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M10 2v3h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 9h6M5 11.5h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>Export as PDF';
  pdfBtn.addEventListener('click', () => window.print());
  shareRow.appendChild(pdfBtn);

  // ── Share by Email button ──
  const emailBtn = document.createElement('button');
  emailBtn.className = 'btn btn-email';
  emailBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="3" width="14" height="10" rx="1.5" stroke="white" stroke-width="1.4"/><path d="M1 4.5l7 5 7-5" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Share by Email';
  emailBtn.addEventListener('click', () => {
    const mailto = buildMailtoLink();
    window.location.href = mailto;
  });
  shareRow.appendChild(emailBtn);

  wrap.appendChild(shareRow);

  // Restart
  const restartRow = document.createElement('div');
  restartRow.className = 'restart-row';
  const restartBtn = document.createElement('button');
  restartBtn.className = 'btn btn-ghost';
  restartBtn.textContent = '← Start New Diagnosis';
  restartBtn.addEventListener('click', () => {
    state.step = 1;
    state.product = null;
    state.fiber = null;
    state.issues = [];
    state.answers = {
      bleach: null, washTemp: null, dryerTemp: null, dryerCycle: null,
      waterHardness: null, softener: null, fabricSoftener: null, brighteners: null, ironTemp: null, washCount: null
    };
    render();
    window.scrollTo(0, 0);
  });
  restartRow.appendChild(restartBtn);
  wrap.appendChild(restartRow);

  return wrap;
}

// ─── Boot ───
render();
</script>
